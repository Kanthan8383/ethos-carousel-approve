<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ethos — Approve carousel</title>
  <style>
    :root { --purple:#6D28D9; --dark:#0A0A0F; --off:#F5F2EC; --gold:#B8945A; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--off); color:var(--dark);
      font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
    .wrap { max-width:520px; margin:0 auto; padding:24px 16px; }
    .brand { font-weight:800; letter-spacing:.5px; color:var(--purple); font-size:13px;
      text-transform:uppercase; margin-bottom:16px; }
    .card { background:#fff; border:1px solid #e7e2d8; border-radius:8px; padding:20px; }
    h2 { margin:0 0 4px; font-size:22px; }
    h3 { margin:18px 0 6px; font-size:15px; }
    p { margin:0 0 12px; }
    .muted { color:#555; }
    pre { white-space:pre-wrap; background:var(--off); padding:12px; border-radius:6px;
      font-family:inherit; font-size:13px; margin:0; }
    img { width:100%; display:block; margin:8px 0; border:1px solid #e7e2d8; border-radius:4px; }
    .btns { display:flex; gap:8px; flex-wrap:wrap; margin:16px 0; }
    button { flex:1 1 30%; padding:14px; border:0; border-radius:6px; color:#fff;
      font-size:15px; font-weight:700; cursor:pointer; }
    .approve { background:#1a7f37; } .reject { background:#b42318; } .regen { background:var(--purple); }
    button[disabled] { opacity:.5; cursor:default; }
    label { display:block; margin:10px 0 0; font-size:13px; font-weight:600; }
    textarea { width:100%; font:inherit; padding:8px; border:1px solid #ccc; border-radius:6px; margin-top:4px; min-height:46px; }
    h4 { margin:14px 0 0; font-size:14px; }
    .err { color:#b42318; font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Ethos Synergy Solutions</div>
    <div class="card" id="app"><p class="muted">Loading…</p></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const token = params.get("token");
    const type = params.get("type") || "carousel";
    // Deploy step replaces https://svzzkesrrvwvpkbaaxlm.supabase.co/functions/v1/decision with the absolute Supabase function URL when the
    // page is hosted off-origin (e.g. GoHighLevel). Left intact, it falls back to same-origin.
    const FN_INJECTED = "https://svzzkesrrvwvpkbaaxlm.supabase.co/functions/v1/decision";
    const FN = FN_INJECTED.startsWith("__") ? location.origin + "/functions/v1/decision" : FN_INJECTED;
    const app = document.getElementById("app");
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    const qs = `id=${encodeURIComponent(id || "")}&token=${encodeURIComponent(token || "")}&type=${encodeURIComponent(type)}`;
    let busy = false;

    async function load() {
      if (!id || !token) { app.innerHTML = "<h2>Invalid link</h2><p class='muted'>This link is missing its details.</p>"; return; }
      let d;
      try { d = await (await fetch(`${FN}?${qs}`)).json(); }
      catch (e) { app.innerHTML = "<h2>Couldn't load</h2><p class='muted'>Please try again.</p>"; return; }
      if (!d.ok) { app.innerHTML = `<h2>Link problem</h2><p class='muted'>${esc(d.error || "")}</p>`; return; }

      if (type === "plan") {
        if (d.status !== "pending_topic") {
          app.innerHTML = `<h2>Already handled</h2><p class='muted'>This topic was already ${esc(d.status)}. No further action needed.</p>`;
          return;
        }
        const b = d.brief || {};
        const outlineHtml = Array.isArray(b.outline) ? (b.outline.length ? `<h3>Outline</h3><ul>${b.outline.map((s) => `<li>${esc(s)}</li>`).join("")}</ul>` : "") : (typeof b.outline === "string" && b.outline ? `<h3>Outline</h3><pre>${esc(b.outline)}</pre>` : "");
        app.innerHTML = `
          <h2>Review topic proposal</h2>
          <p class="muted">Approve to generate a carousel, or skip to get a different topic.</p>
          <p><b>Topic:</b> ${esc(b.topic)}</p>
          <p><b>Subject:</b> ${esc(b.subject)}</p>
          <p><b>Angle:</b> ${esc(b.angle)}</p>
          <p><b>Hook archetype:</b> ${esc(b.hook_archetype)}</p>
          ${outlineHtml}
          <div class="btns">
            <button class="approve" data-a="approve">Approve</button>
            <button class="reject" data-a="skip">Skip</button>
          </div>`;
        app.querySelectorAll("button[data-a]").forEach((btn) => (btn.onclick = () => act(btn.dataset.a)));
        return;
      }

      if (d.status !== "pending_approval") {
        app.innerHTML = `<h2>Already handled</h2><p class='muted'>This carousel was already ${esc(d.status)}. No further action needed.</p>`;
        return;
      }
      const car = d.slides || {};
      const slides = (d.media_urls || []).map((u, i) => `<img src="${esc(u)}" alt="slide ${i + 1}">`).join("");
      app.innerHTML = `
        <h2>Review carousel</h2>
        <p class="muted">Pick an action. Nothing publishes until you tap.</p>
        <p><b>Topic:</b> ${esc(d.topic)}</p>
        <div class="btns">
          <button class="approve" data-a="approve">Approve</button>
          <button class="reject" data-a="reject">Reject</button>
          <button class="regen" data-a="regenerate">Regenerate</button>
        </div>
        <p><button class="regen" id="editBtn" style="width:100%">Edit copy</button></p>
        <h3>Caption</h3><pre>${esc(d.caption)}</pre>
        <h3>Slides</h3>${slides}`;
      app.querySelectorAll("button[data-a]").forEach((b) => (b.onclick = () => act(b.dataset.a)));
      const editBtn = document.getElementById("editBtn");
      if (editBtn) editBtn.onclick = () => showEdit(car);
    }

    async function act(action) {
      if (busy) return; busy = true;
      app.querySelectorAll("button").forEach((b) => (b.disabled = true));
      let d;
      try { d = await (await fetch(`${FN}?${qs}&action=${action}`, { method: "POST" })).json(); }
      catch (e) { app.innerHTML = "<h2>Something went wrong</h2><p class='muted'>Please try again.</p>"; busy = false; return; }
      if (d.ok) app.innerHTML = `<h2>${esc(d.heading)}</h2><p>${esc(d.message)}</p>`;
      else app.innerHTML = `<h2>Already handled</h2><p class="muted">${esc(d.message || d.error || "")}</p>`;
    }

    function showEdit(car) {
      const slides = Array.isArray(car.slides) ? car.slides : [];
      const slideFields = slides.map((s, i) => `
        <h4>Value slide ${i + 1}</h4>
        <label>Title<textarea data-slide="${i}" data-f="title">${esc(s.title)}</textarea></label>
        <label>Idea<textarea data-slide="${i}" data-f="idea">${esc(s.idea)}</textarea></label>
        <label>Payoff<textarea data-slide="${i}" data-f="payoff">${esc(s.payoff)}</textarea></label>`).join("");
      app.innerHTML = `
        <h2>Edit copy</h2>
        <p class="muted">Edit the text, then save. The slides re-render and you'll get them back to approve before anything publishes.</p>
        <h4>Hook headline</h4>
        <label><textarea id="f-headline">${esc(car.hook && car.hook.headline)}</textarea></label>
        ${slideFields}
        <h4>CTA line</h4>
        <label><textarea id="f-cta">${esc(car.cta && car.cta.line)}</textarea></label>
        <h4>Caption</h4>
        <label><textarea id="f-caption" style="min-height:120px">${esc(car.caption)}</textarea></label>
        <p id="editErr" class="err"></p>
        <div class="btns">
          <button class="approve" id="saveBtn">Save & re-render</button>
          <button class="reject" id="cancelBtn">Cancel</button>
        </div>`;
      document.getElementById("cancelBtn").onclick = () => load();
      document.getElementById("saveBtn").onclick = () => saveEdit(car);
    }

    async function saveEdit(car) {
      if (busy) return;
      const edited = JSON.parse(JSON.stringify(car || {}));
      edited.hook = edited.hook || {}; edited.cta = edited.cta || {};
      const val = (id) => (document.getElementById(id).value || "").trim();
      edited.hook.headline = val("f-headline");
      edited.cta.line = val("f-cta");
      edited.caption = val("f-caption");
      edited.slides = (Array.isArray(edited.slides) ? edited.slides : []).map((s, i) => ({
        ...s,
        title: (document.querySelector(`[data-slide="${i}"][data-f="title"]`).value || "").trim(),
        idea: (document.querySelector(`[data-slide="${i}"][data-f="idea"]`).value || "").trim(),
        payoff: (document.querySelector(`[data-slide="${i}"][data-f="payoff"]`).value || "").trim(),
      }));
      const errEl = document.getElementById("editErr");
      const missing = !edited.hook.headline || !edited.cta.line || !edited.caption ||
        edited.slides.length === 0 || edited.slides.some((s) => !s.title || !s.idea || !s.payoff);
      if (missing) { errEl.textContent = "Every field is required. Please fill the empty ones."; return; }
      busy = true;
      app.querySelectorAll("button").forEach((b) => (b.disabled = true));
      let d;
      try {
        d = await (await fetch(`${FN}?${qs}&action=edit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ carousel: edited }),
        })).json();
      } catch (e) {
        app.innerHTML = "<h2>Something went wrong</h2><p class='muted'>Please try again.</p>"; busy = false; return;
      }
      if (d.ok) { app.innerHTML = `<h2>${esc(d.heading)}</h2><p>${esc(d.message)}</p>`; }
      else {
        busy = false;
        app.querySelectorAll("button").forEach((b) => (b.disabled = false));
        errEl.textContent = d.error || d.message || "Could not save.";
      }
    }

    load();
  </script>
</body>
</html>
